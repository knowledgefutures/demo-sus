# SOPS configuration. Specifies which age public keys can decrypt.
# Same recipients as the main underlay repo, so the team's existing age key
# (the SOPS_AGE_SECRET_KEY GitHub secret) decrypts these files too.
# Generate a keypair: age-keygen -o key.txt

creation_rules:
  - path_regex: \.env\.(local|prod|dev)(\.enc)?$
    age: >-
      age1wravpjmed26772xfjhawmnsnc4933htapg6y5xseqml0jdv8z9hqemzhcr,
      age1ysddqggsx3h8zkv7xn3z26sjak5pqms6pyqhnky9ukrvpk7es5jsayz8w7,
      age1h86dek80u5t677tsparz395uk3zvz4yuj9m5t2v2nsdfsvyjmafsra5yt7
